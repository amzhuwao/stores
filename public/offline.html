<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Manica Skyview Stores</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: #f5f1e8;
            color: #2c3e50;
        }
        .offline-card {
            max-width: 420px;
            padding: 32px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.12);
            text-align: center;
        }
        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }
        p {
            margin: 0 0 10px;
            line-height: 1.5;
            color: #5d6d7e;
        }
        .badge {
            display: inline-block;
            margin-bottom: 16px;
            padding: 6px 12px;
            border-radius: 999px;
            background: #667eea;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="badge">Offline</div>
        <h1>You're offline</h1>
        <p>The app shell is still available, but live data and new transactions will sync when your connection returns.</p>
        <p>Please reconnect to continue working with stock, requisitions, and reports.</p>
    </div>
</body>
</html>
